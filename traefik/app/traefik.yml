api:
  dashboard: false
  insecure: true

entryPoints:
  http:
    address: ":80"
  https:
    address: ":443"

providers:
  docker:
    endpoint: "unix:///var/run/docker.sock"
    exposedByDefault: false
    useBindPortIP: true
  file:
    directory: /custom
    watch: true

certificatesResolvers:
  letsencrypt:
    acme:
      email: banalnietsifry@gmail.com
      storage: "/etc/traefik/acme/letsencrypt_acme.json"
      keyType: EC256
      httpChallenge:
        entryPoint: http
      tlsChallenge: {}
